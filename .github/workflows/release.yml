name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub release and upload assets

jobs:
  goreleaser:
    # macOS so the darwin builds can link the Security framework via CGO; the
    # linux builds are pure Go (CGO off) and cross-compile from the same host.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags for the changelog

      # Fail in seconds (not after a full macOS build) if the tap PAT is missing
      # or empty, since the Homebrew cask push would 401 at the very end.
      - name: Verify tap token is present
        env:
          TAP_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::GH_PAT secret is empty or unset. Set it with: gh secret set GH_PAT --repo alexrios/opq"
            exit 1
          fi

      # Provisions the toolchain pinned in mise.toml ([tools] go + goreleaser),
      # so releases use the same Go and GoReleaser as `mise run release` locally.
      - uses: jdx/mise-action@v4
        with:
          cache: true

      - run: mise run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to alexrios/homebrew-tap (cross-repo cask push).
          # Reuses the same GH_PAT secret as the other taps (e.g. goenv).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
